<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Email</title>
</head>
<body style="font-family: Arial; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px;">
        
        <h2 style="color: #333;">Verify Your Email</h2>
        
        <p>Hello <strong th:text="${username}">User</strong>,</p>
        
        <p>Click the button below to verify your email:</p>

        <a th:href="${verificationLink}" 
           style="display: inline-block; padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 5px;">
           Verify Email
        </a>

        <p style="margin-top: 20px;">This link will expire in 10 minutes.</p>

        <p>If you didn't request this, ignore this email.</p>

        <hr>
        <small>Inventory System</small>
    </div>
</body>
</html>
